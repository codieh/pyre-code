name: Feature Request
description: Suggest a new feature, workflow improvement, or content addition.
title: "[Feature] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion.

        请尽量说明：
        - 你遇到的实际问题
        - 希望新增什么能力
        - 这个改动会如何帮助使用者
  - type: textarea
    id: problem
    attributes:
      label: Problem / 需求背景
      description: What problem are you trying to solve?
      placeholder: Describe the current limitation or friction.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution / 期望方案
      description: What would you like to see added or changed?
      placeholder: Describe the feature or behavior you want.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area / 影响范围
      options:
        - Web UI / 前端界面
        - Grading Service / 评测服务
        - Setup & Local Dev / 安装与本地启动
        - Problem Set / 题库内容
        - Learning Paths / 学习路径
        - Docs / 文档
        - Other / 其他
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered / 备选方案
      description: Did you consider any workaround or alternative?
      placeholder: Optional, but useful if you already explored other approaches.
  - type: textarea
    id: user_impact
    attributes:
      label: User Impact / 用户价值
      description: Who benefits from this and how?
      placeholder: Explain why this feature is worth adding.
    validations:
      required: true
  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context / 补充信息
      description: Mockups, references, related issues, or examples.
