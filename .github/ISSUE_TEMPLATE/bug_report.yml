name: Bug Report
description: Report a reproducible bug in the app, grading service, setup flow, or docs.
title: "[Bug] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report.

        请尽量提供可复现信息，尤其是：
        - 出问题的页面 / 命令
        - 操作步骤
        - 实际结果与预期结果
        - 系统环境和报错截图
  - type: textarea
    id: summary
    attributes:
      label: Summary / 问题概述
      description: What went wrong?
      placeholder: A short description of the bug.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area / 影响范围
      description: Which part is affected?
      options:
        - Web UI / 前端界面
        - Grading Service / 评测服务
        - Setup & Local Dev / 安装与本地启动
        - Problem Content / 题目内容
        - Docs / 文档
        - Other / 其他
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce / 复现步骤
      description: Provide clear, numbered reproduction steps.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Run ...
        4. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior / 预期结果
      placeholder: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior / 实际结果
      placeholder: What happened instead? Include the full error message if possible.
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots Or Logs / 截图或日志
      description: Paste screenshots, terminal output, browser console logs, or stack traces here.
      render: shell
  - type: textarea
    id: environment
    attributes:
      label: Environment / 环境信息
      description: Include any details that may matter for reproduction.
      placeholder: |
        OS: Windows 11 / macOS / Linux
        Browser: Chrome / Safari / Firefox
        Python: 3.11.x
        Node.js: 18.x / 20.x
        Command: npm run dev
    validations:
      required: true
  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context / 补充信息
      description: Anything else that would help us debug this?
